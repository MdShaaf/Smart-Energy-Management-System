##-------------------------------------------
## rain Prediction prediction config
##-------------------------------------------

features_rain_prediction:

  cloud_cover
  relative_humidity_2m
  temperature_2m
  wind_speed_10m
  pressure_msl
  day
  month
  Season


logistic_rain_prediction_parameters:
  "class_weight" : "balanced"
  "random_state" : 42
  "max_iter" : 1000


rf_rain_prediction_parameters:
  "n_estimators": 496
  "max_depth": 26
  "min_samples_split": 4
  "min_samples_leaf": 1
  "max_features": "sqrt"
  "random_state": 42
  "n_jobs": -1

xgb_rain_prediction_parameters:
  "n_estimators": 757
  "max_depth": 10
  "learning_rate": 0.24
  "subsample": 0.9
  "colsample_bytree": 0.8
  "gamma": 0.3
  "min_child_weight": 1



##-------------------------------------------
## Energy Demand prediction config
##-------------------------------------------

features:
  -'Household_Size'
  -'Avg_Temperature_C_x'
  -'Has_AC'
  -'Avg_Humidity_Pct'
  -'Day'
  -'Month'
  -'Is Weekend'
  -'Is_Holiday'

target: "Peak_Hours_Usage_kWh"


rf_demand_prediction_parameters:
  'n_estimators': 500
  'max_depth': 5
  'min_samples_split': 0.9
  'min_samples_leaf': 7
  'random_state': 100 

### From Gridsearch CV
xgb_demand_prediction_params:
  'learning_rate': 0.01
  'max_depth': 3
  'n_estimators': 800
  'subsample': 0.8
  'random_state': 100